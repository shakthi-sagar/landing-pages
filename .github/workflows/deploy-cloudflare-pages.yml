name: Deploy App Landing Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: quickpeek
            project: quickpeek
          - app: swiftgpt
            project: swiftgpt
          - app: lockin
            project: lockin
          - app: toolbento
            project: toolbento

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root

      - name: Build app
        run: npm run build --workspace ${{ matrix.app }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy "apps/${{ matrix.app }}/dist" \
            --project-name "${{ matrix.project }}" \
            --branch main
